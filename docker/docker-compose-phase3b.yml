services:
  postgres:
    image: postgres:15-alpine
    container_name: druid-postgres
    environment:
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid123
      POSTGRES_DB: druid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxi-network

  zookeeper-druid:
    image: zookeeper:3.8
    container_name: druid-zookeeper
    environment:
      ZOO_MY_ID: 1
    ports:
      - "2182:2181"
    networks:
      - taxi-network

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - taxi-network

  druid-coordinator:
    image: apache/druid:28.0.0
    container_name: druid-coordinator
    depends_on:
      - postgres
      - zookeeper-druid
    environment:
      - DRUID_XMX=512m
      - DRUID_XMS=512m
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=derby
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/druid/var/druid/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/druid/var/druid/indexing-logs
    volumes:
      - druid_shared:/opt/druid/var
    ports:
      - "8081:8081"
    command:
      - coordinator
    networks:
      - taxi-network

  druid-broker:
    image: apache/druid:28.0.0
    container_name: druid-broker
    depends_on:
      - druid-coordinator
    environment:
      - DRUID_XMX=1g
      - DRUID_XMS=1g
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=derby
    volumes:
      - druid_shared:/opt/druid/var
    ports:
      - "8082:8082"
    command:
      - broker
    networks:
      - taxi-network

  druid-historical:
    image: apache/druid:28.0.0
    container_name: druid-historical
    depends_on:
      - druid-coordinator
    environment:
      - DRUID_XMX=1g
      - DRUID_XMS=1g
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=derby
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/druid/var/druid/segments
      - druid_segmentCache_locations=[{"path":"/opt/druid/var/druid/segment-cache","maxSize":1000000000}]
    volumes:
      - druid_shared:/opt/druid/var
    ports:
      - "8083:8083"
    command:
      - historical
    networks:
      - taxi-network

  druid-middlemanager:
    image: apache/druid:28.0.0
    container_name: druid-middlemanager
    depends_on:
      - druid-coordinator
    environment:
      - DRUID_XMX=512m
      - DRUID_XMS=512m
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=derby
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/druid/var/druid/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/druid/var/druid/indexing-logs
    volumes:
      - druid_shared:/opt/druid/var
    ports:
      - "8091:8091"
    command:
      - middleManager
    networks:
      - taxi-network

  druid-router:
    image: apache/druid:28.0.0
    container_name: druid-router
    depends_on:
      - druid-broker
      - druid-coordinator
    environment:
      - DRUID_XMX=256m
      - DRUID_XMS=256m
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_router_managementProxy_enabled=true
    volumes:
      - druid_shared:/opt/druid/var
    ports:
      - "8888:8888"
    command:
      - router
    networks:
      - taxi-network

networks:
  taxi-network:
    external: true

volumes:
  postgres_data:
  minio_data:
  druid_shared: