version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: druid-postgres
    environment:
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid123
      POSTGRES_DB: druid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxi-network

  zookeeper-druid:
    image: zookeeper:3.8
    container_name: druid-zookeeper
    environment:
      ZOO_MY_ID: 1
    ports:
      - "2182:2181"
    volumes:
      - zk_druid_data:/data
      - zk_druid_logs:/datalog
    networks:
      - taxi-network

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - taxi-network

  druid-coordinator:
    image: apache/druid:28.0.0
    container_name: druid-coordinator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DRUID_XMX=512m
      - DRUID_XMS=512m
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid123
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_storage_type=s3
      - druid_s3_accessKey=minioadmin
      - druid_s3_secretKey=minioadmin123
      - druid_s3_endpoint_url=http://minio:9000
      - druid_s3_enablePathStyleAccess=true
      - druid_storage_bucket=druid-deep-storage
      - druid_storage_baseKey=druid/segments
    volumes:
      - druid_coordinator:/opt/druid/var
    ports:
      - "8081:8081"
    command:
      - coordinator
    networks:
      - taxi-network

  druid-broker:
    image: apache/druid:28.0.0
    container_name: druid-broker
    depends_on:
      - druid-coordinator
    environment:
      - DRUID_XMX=1g
      - DRUID_XMS=1g
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid123
    volumes:
      - druid_broker:/opt/druid/var
    ports:
      - "8082:8082"
    command:
      - broker
    networks:
      - taxi-network

  druid-historical:
    image: apache/druid:28.0.0
    container_name: druid-historical
    depends_on:
      - druid-coordinator
    environment:
      - DRUID_XMX=1g
      - DRUID_XMS=1g
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid123
      - druid_storage_type=s3
      - druid_s3_accessKey=minioadmin
      - druid_s3_secretKey=minioadmin123
      - druid_s3_endpoint_url=http://minio:9000
      - druid_s3_enablePathStyleAccess=true
      - druid_storage_bucket=druid-deep-storage
      - druid_storage_baseKey=druid/segments
    volumes:
      - druid_historical:/opt/druid/var
    ports:
      - "8083:8083"
    command:
      - historical
    networks:
      - taxi-network

  druid-middlemanager:
    image: apache/druid:28.0.0
    container_name: druid-middlemanager
    depends_on:
      - druid-coordinator
    environment:
      - DRUID_XMX=512m
      - DRUID_XMS=512m
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid123
      - druid_storage_type=s3
      - druid_s3_accessKey=minioadmin
      - druid_s3_secretKey=minioadmin123
      - druid_s3_endpoint_url=http://minio:9000
      - druid_s3_enablePathStyleAccess=true
      - druid_storage_bucket=druid-deep-storage
      - druid_storage_baseKey=druid/segments
    volumes:
      - druid_middlemanager:/opt/druid/var
    ports:
      - "8091:8091"
    command:
      - middleManager
    networks:
      - taxi-network

  druid-router:
    image: apache/druid:28.0.0
    container_name: druid-router
    depends_on:
      - druid-broker
      - druid-coordinator
    environment:
      - DRUID_XMX=256m
      - DRUID_XMS=256m
      - druid_zk_service_host=zookeeper-druid:2181
      - druid_router_managementProxy_enabled=true
    volumes:
      - druid_router:/opt/druid/var
    ports:
      - "8888:8888"
    command:
      - router
    networks:
      - taxi-network

networks:
  taxi-network:
    driver: bridge

volumes:
  postgres_data:
  zk_druid_data:
  zk_druid_logs:
  minio_data:
  druid_coordinator:
  druid_broker:
  druid_historical:
  druid_middlemanager:
  druid_router: