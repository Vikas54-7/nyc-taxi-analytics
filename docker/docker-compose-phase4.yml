services:
  airflow-postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxi-network

  airflow-init:
    image: apache/airflow:2.8.0-python3.11
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'zTvhk-Z3g7nFmGLWkZj2rk0KqVqJZ8KqLcHxONLKYMw='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        echo "Airflow initialized!"
    networks:
      - taxi-network

  airflow-webserver:
    image: apache/airflow:2.8.0-python3.11
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'zTvhk-Z3g7nFmGLWkZj2rk0KqVqJZ8KqLcHxONLKYMw='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    ports:
      - "8085:8080"
    command: webserver
    restart: always
    networks:
      - taxi-network

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.11
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'zTvhk-Z3g7nFmGLWkZj2rk0KqVqJZ8KqLcHxONLKYMw='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: scheduler
    restart: always
    networks:
      - taxi-network

networks:
  taxi-network:
    external: true

volumes:
  airflow_postgres_data: